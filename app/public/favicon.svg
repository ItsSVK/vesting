<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d2026"/>
      <stop offset="100%" stop-color="#11131a"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <!-- Bold V letter, centered -->
  <text
    x="256"
    y="360"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="340"
    font-weight="800"
    text-anchor="middle"
    fill="url(#letter)"
    letter-spacing="-8"
  >V</text>
</svg>
